<mat-card class="dialog-card" role="dialog" aria-labelledby="add-account-title">
  <mat-card-header class="dialog-header">
    <div class="dialog-header-text">
      <mat-card-title id="add-account-title">{{ title }}</mat-card-title>
      <mat-card-subtitle>{{ subtitle }}</mat-card-subtitle>
    </div>
    <button type="button" mat-icon-button aria-label="Close dialog" (click)="closeDialog()">
      <mat-icon>close</mat-icon>
    </button>
  </mat-card-header>

  <form #accountForm="ngForm" (ngSubmit)="submit()" class="dialog-body">
    <div class="row g-3">
      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Account name</mat-label>
          <input matInput name="name" [(ngModel)]="formData.name" required />
        </mat-form-field>
      </div>

      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Institution</mat-label>
          <input
            matInput
            name="institution"
            [(ngModel)]="formData.institution"
            required
            [disabled]="isEditMode"
          />
        </mat-form-field>
      </div>

      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Account type</mat-label>
          <mat-select name="type" [(ngModel)]="formData.type" required [disabled]="isEditMode">
            <mat-option value="" disabled>Select Account Type</mat-option>
            @for (accountType of accountTypes; track $index) {
              <mat-option [value]="accountType.value">
                {{ accountType.label }}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Current balance</mat-label>
          <input
            matInput
            name="balance"
            [(ngModel)]="formData.currentBalance"
            required
            [disabled]="isEditMode"
          />
        </mat-form-field>
      </div>
    </div>

    <footer class="dialog-footer">
      <button type="button" mat-stroked-button (click)="closeDialog()">Cancel</button>
      <button type="submit" mat-flat-button color="primary" [disabled]="accountForm.invalid">
        {{ submitButtonLabel }}
      </button>
    </footer>
  </form>
</mat-card>
